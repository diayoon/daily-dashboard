<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daystrip icon">
  <defs>
    <linearGradient id="dayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffd9a8"/>
      <stop offset="50%" stop-color="#b9dabf"/>
      <stop offset="100%" stop-color="#c4cae8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- iOS 자동 라운드를 위해 풀 라운드 사각형 -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#dayGrad)"/>
  <!-- 부드러운 하이라이트 -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>
  <!-- 시간대 띠 — 얇은 가로줄 셋 (morning, noon, evening) -->
  <g opacity="0.55">
    <rect x="220" y="316" width="584" height="6"  rx="3" fill="#ffffff"/>
    <rect x="220" y="510" width="584" height="6"  rx="3" fill="#ffffff"/>
    <rect x="220" y="704" width="584" height="6"  rx="3" fill="#ffffff"/>
  </g>
</svg>
